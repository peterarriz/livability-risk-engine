name: Validate live backend (E2E smoke check)

# task: data-039
# lane: data
#
# Manual-trigger workflow that runs scripts/validate_live.py against the
# deployed Railway backend to confirm /health, /score, and /debug/score
# all return live data (mode="live", db_connection=true).
#
# Required input:
#   backend_url — Railway backend public URL
#                 (e.g. https://livability-risk-engine.up.railway.app)
#
# This workflow requires no secrets. It hits the public Railway URL directly.

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Railway backend URL (e.g. https://your-app.up.railway.app)"
        required: true
        type: string

jobs:
  validate:
    name: E2E smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run validation script
        env:
          BACKEND_URL: ${{ github.event.inputs.backend_url }}
        run: python scripts/validate_live.py
