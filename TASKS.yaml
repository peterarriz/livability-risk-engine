         secrets to enable Slack alerts.
      3. backend/app/main.py /health/db: now queries ingest_runs for the most
         recent finished run and returns last_ingest_at (ISO timestamp),
         last_ingest_status ('success'/'failed'), and last_ingest_count (int).
      Next: data-043 — wire API call metering to api_keys table.

  - id: data-042
    title: Validate and calibrate scoring weights against real addresses
    status: done
    priority: high
    github_issue: ~
    notes_for_next_agent: >
      Completed 2026-03-23. DB not yet live; calibration used synthetic fixtures.
      All 7 scenarios passed (5 QA addresses + 2 edge cases). No BASE_WEIGHTS
      changes needed — all bands aligned to docs/03_scoring_model.md.
      One fix applied: road_construction (weight 20) was missing from
      _derive_severity, _build_top_risks, and _build_explanation in
