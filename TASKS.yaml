  - id: data-046
    title: Add utility outage and repair data sources to scoring model
    status: done
    priority: medium
    github_issue: 167
    notes_for_next_agent: >
      Implemented data-046. No new ingest script needed — utility data flows through
      the existing 311 pipeline (chicago_311_requests.py / v6vf-nfxy).
      Changes made:
        - backend/models/project.py: Added IMPACT_UTILITY_OUTAGE ("utility_outage",
          weight 25, severity HIGH) and IMPACT_UTILITY_REPAIR ("utility_repair",
          weight 15, severity MEDIUM) constants. Updated _classify_311_request()
          to map water main breaks and gas leaks to utility_outage (was construction).
        - backend/ingest/chicago_311_requests.py: Added "Gas Leak" to DISRUPTION_SR_TYPES.
        - backend/scoring/query.py: Imported new constants. Updated _derive_severity()
          (utility types contribute to traffic + noise), _build_top_risks(), and
          _build_explanation() with utility-specific strings.
        - IMPACT_UTILITY_REPAIR (weight 15) is in the model for future use but no
          records map to it yet — no public API found for Peoples Gas repair crews.
        - ComEd planned outages: won't-fix, no public REST API exists.
        - Utility ingest is controlled by the existing --skip-311 flag in run_pipeline.py.

  - id: data-038
    title: Add traffic signal outage signals to scoring model
    status: done
    priority: medium
    github_issue: 171
    notes_for_next_agent: >
      Research confirmed: no standalone traffic signal outage dataset exists on the
      Chicago Data Portal. Reports flow through the existing 311 dataset (v6vf-nfxy)
      with SR types like "Traffic Signal Out - All Signals Out".
      Implementation mirrors how utility_outage was added in PR #168:
        - Added SR types to DISRUPTION_SR_TYPES in chicago_311_requests.py:
          "Traffic Signal Out - All Signals Out", "Traffic Signal Out - Sporadic/Cycling",
          "Traffic Light Out - All Signals Out" (alternate name variant)
        - Added IMPACT_TRAFFIC_SIGNAL = "traffic_signal_outage" to project.py
          with weight 22 (HIGH severity — between closure_single_lane=28 and
          road_construction=20). Regex _311_SIGNAL matches any "traffic signal/light * out"
          SR type, so variant names are handled gracefully.
        - Wired into query.py: contributes to traffic severity; own risk string
          ("Traffic signal outage at intersection near...") and explanation.
        - Added to map-view.tsx: yellow #EAB308, 160m radius, "Traffic signal outage" label.
        - Added to api.ts ImpactType union.
      IMPORTANT: SR type strings MUST be verified with a live dry-run once
      network access is available:
        python backend/ingest/chicago_311_requests.py --dry-run
      If the SR types don't match exactly, update DISRUPTION_SR_TYPES and _311_SIGNAL
      regex with the correct strings. The regex fallback will catch variants.

