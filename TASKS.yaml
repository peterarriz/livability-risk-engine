---
# TASKS.yaml
# Chicago MVP — Data Lane task registry
# Format:
#   id:          task identifier (data-NNN)
#   title:       short description
#   status:      done | in-progress | backlog
#   priority:    high | medium | low
#   github_issue: issue number on peterarriz/livability-risk-engine
#   notes_for_next_agent: key context for the agent picking this up next

tasks:
  - id: data-001
    title: Define project schema and data model
    status: done
    priority: high
    notes_for_next_agent: >
      Schema lives in db/schema.sql. Canonical table is `projects`.
      All scoring queries run against `projects`, not raw tables.

  - id: data-002
    title: Ingest Chicago building permits from Socrata API
    status: done
    priority: high
    notes_for_next_agent: >
      Script: backend/ingest/building_permits.py.
      Output: data/raw/building_permits.json.
      Uses CHICAGO_SOCRATA_APP_TOKEN env var (optional).

  - id: data-003
    title: Data model — Project dataclass and normalization helpers
    status: done
    priority: high
    notes_for_next_agent: >
      backend/models/project.py: Project dataclass, normalize_permit,
      normalize_closure. These are the only normalization functions
      that should feed into the projects table.

  - id: data-004
    title: Ingest Chicago CDOT street closures from Socrata API
    status: done
    priority: high
    notes_for_next_agent: >
      Script: backend/ingest/street_closures.py.
      Output: data/raw/street_closures.json.
      Street closures carry the highest weight in the scoring model.

  - id: data-005
    title: Canonical projects table schema (PostGIS)
    status: done
    priority: high
    notes_for_next_agent: >
      db/schema.sql: projects table with PostGIS geom column.
      ST_DWithin on geom is the primary scoring query pattern.

  - id: data-006
    title: Normalize building permits into canonical projects table
    status: done
    priority: high
    notes_for_next_agent: >
      normalize_permit() in backend/models/project.py.
      Called by load_projects.py.

  - id: data-007
    title: Normalize street closures into canonical projects table
    status: done
    priority: high
    notes_for_next_agent: >
      normalize_closure() in backend/models/project.py.
      Called by load_projects.py.

  - id: data-008
    title: Geocoding — address to lat/lon via Chicago geocoder
    status: done
    priority: high
    notes_for_next_agent: >
      backend/ingest/geocode.py: geocode_address(address) → (lat, lon) | None.
      Uses Chicago PDOK / Nominatim as fallback.

  - id: data-009
    title: Scoring query — ST_DWithin radius query against projects table
    status: done
    priority: high
    notes_for_next_agent: >
      backend/scoring/query.py: get_nearby_projects(), compute_score().
      Radius is 500m. Returns list of NearbyProject(project, distance_m).

  - id: data-010
    title: Ingest freshness check
    status: done
    priority: medium
    notes_for_next_agent: >
      backend/ingest/check_freshness.py. Reads ingest_runs table.
      Used by /health to expose last_ingest_status (future).

  - id: data-011
    title: Geocode fill — backfill missing coordinates in staging files
    status: done
    priority: medium
    notes_for_next_agent: >
      backend/ingest/geocode_fill.py: reads staging JSON, geocodes records
      missing lat/lon, writes back. Run before load_projects.py.

  - id: data-012
    title: DB summary / row count reporter
    status: done
    priority: low
    notes_for_next_agent: >
      backend/ingest/db_summary.py: prints row counts for all tables.
      Useful for post-ingest validation.

  - id: data-013
    title: DB loader — upsert normalized Project records into projects table
    status: done
    priority: high
    notes_for_next_agent: >
      backend/ingest/load_projects.py. Reads staging JSON files,
      normalizes, upserts into projects table with ON CONFLICT idempotency.
      Populates geom column from lat/lon. Supports --dry-run.

  - id: data-014
    title: Audit DB hosting requirements and document options
    status: done
    priority: high
    notes_for_next_agent: >
      Evaluated Railway, Supabase, Render. Railway chosen — supports
      PostGIS, easy DATABASE_URL injection, free tier available.
      DATABASE_URL added as GitHub secret.

  - id: data-015
    title: Provision Railway Postgres+PostGIS instance
    status: done
    priority: high
    notes_for_next_agent: >
      Railway DB is live. DATABASE_URL is in GitHub secrets.
      Schema not yet applied as of data-015 completion.

  - id: data-016
    title: Create pipeline orchestrator and schema apply script
    status: done
    priority: high
    notes_for_next_agent: >
      run_pipeline.py at repo root orchestrates all 4 ingest steps.
      scripts/apply_schema.sh applies db/schema.sql via psql.
      Both accept DATABASE_URL env var.

  - id: data-017
    title: Apply schema and run live ingest against Railway database
    status: in-progress
    priority: high
    github_issue: 30
    notes_for_next_agent: >
      Code changes are done (PR on branch claude/issue-30-20260319-1800):
        - run_pipeline.py created
        - scripts/apply_schema.sh created
        - Demo fallback removed from backend/app/main.py
        - Demo fallback removed from frontend/src/lib/api.ts
      Remaining manual steps (require DATABASE_URL secret):
        1. Apply schema: DATABASE_URL=$SECRET ./scripts/apply_schema.sh
        2. Run ingest:   DATABASE_URL=$SECRET python run_pipeline.py
        3. Validate:     curl "$BACKEND_URL/health" → db_connection=true
                         curl "$BACKEND_URL/score?address=100+W+Randolph+St+Chicago"
      Once validated, this task is done. Next: data-018 (schedule ingest cron).

  - id: data-018
    title: Deploy FastAPI backend to Railway — code delivery
    status: done
    priority: high
    github_issue: 41
    notes_for_next_agent: >
      Delivered backend/railway.toml, backend/Procfile, and root railway.toml.
      CORS set via FRONTEND_ORIGIN env var. /health endpoint live in main.py.
      Manual deploy steps tracked in data-019 (issue #49).

  - id: data-019
    title: Deploy FastAPI backend to Railway — operator steps and validation
    status: in-progress
    priority: high
    github_issue: 49
    notes_for_next_agent: >
      Code is in place (railway.toml, Procfile, /health endpoint).
      Remaining manual steps (require dashboard access):
        1. railway.app → New Project → Deploy from GitHub → peterarriz/livability-risk-engine
        2. Add Railway Postgres service to same project (DATABASE_URL auto-injected)
        3. Set FRONTEND_ORIGIN = https://livability-risk-engine.vercel.app
        4. Copy Railway public URL (e.g. https://livability-risk-engine.up.railway.app)
        5. vercel.com → Settings → Env Vars → NEXT_PUBLIC_API_URL = <railway-url>
        6. Redeploy frontend
        7. Validate: curl <railway-url>/health  → db_connection=true
                     curl "<railway-url>/score?address=100+W+Randolph+St+Chicago+IL"
      Once validated, mark this task done and proceed to data-020.

  - id: data-020
    title: Schedule recurring ingest pipeline via GitHub Actions cron
    status: done
    priority: high
    notes_for_next_agent: >
      .github/workflows/ingest.yml created. Runs daily at 06:00 UTC.
      Applies schema (idempotent), runs run_pipeline.py, then smoke-checks
      active project count. Manual dispatch supported with dry_run and
      skip_geocode inputs. Requires DATABASE_URL GitHub secret.
      CHICAGO_SOCRATA_APP_TOKEN optional but recommended.

  - id: data-019
    title: Add Railway deployment config for FastAPI backend
    status: done
    priority: high
    notes_for_next_agent: >
      railway.toml and Procfile committed. Manual steps still required:
        1. Railway dashboard → New Project → Deploy from GitHub repo
        2. Set DATABASE_URL + FRONTEND_ORIGIN env vars in Railway
        3. Copy Railway public URL → set as NEXT_PUBLIC_API_URL in Vercel
        4. Redeploy Vercel frontend
        5. Validate: curl <railway-url>/health → db_connection=true

# ---------------------------------------------------------------------------
# App lane — product / UX tasks
# Lane: app
# Format mirrors data lane above.
# ---------------------------------------------------------------------------

  - id: app-009
    title: Fix 4 small UX bugs (confidence reasons, alert, demo chips, compare link)
    status: done
    priority: high
    github_issue: ~
    notes_for_next_agent: >
      Committed on branch claude/improve-livability-ux-i8yCL.
      1. Report page now calls getConfidenceReasons() instead of passing [].
      2. Export PDF button is now an <a href="#pricing-section"> not alert().
      3. Demo section chips use handleSuggestionSelect + scrollIntoView.
      4. Compare link focuses + scrolls to address input.

  - id: app-010
    title: Fix icon-btn anchor tag missing text-decoration none
    status: done
    priority: high
    notes_for_next_agent: >
      After app-009, the "Export PDF" button is an <a> using class icon-btn.
      The .icon-btn CSS was written for <button> elements — it does not set
      text-decoration: none or display: inline-flex, so some browsers will
      render a visible underline and the layout may shift.
      Fix: add text-decoration: none and ensure display: inline-flex to
      .icon-btn in globals.css, and audit any other .action-btn usage on <a>.

  - id: app-011
    title: Escape key closes save report modal
    status: done
    priority: high
    notes_for_next_agent: >
      The save modal (showSaveModal) in page.tsx has no Escape key handler.
      Keyboard users cannot dismiss it without clicking the close button.
      Fix: add a useEffect in page.tsx that listens for keydown "Escape"
      and calls setShowSaveModal(false) when the modal is open.
      Also add email validation before enabling the CTA button so it is not
      always clickable regardless of input.

  - id: app-012
    title: Risk card grid empty columns when fewer than 3 risks
    status: done
    priority: medium
    notes_for_next_agent: >
      .risk-card-grid uses grid-template-columns: repeat(3, minmax(0, 1fr)).
      When top_risks has 1 or 2 items the grid renders empty columns that
      look like layout bugs.
      Fix: in score-experience.tsx, set the grid column count dynamically
      based on the number of risk cards (clamp to 1–3). Either via an inline
      style or a BEM modifier class (risk-card-grid--1col, --2col, --3col).

  - id: app-013
    title: Update document.title when address result loads
    status: done
    priority: medium
    notes_for_next_agent: >
      layout.tsx exports a static metadata title "Livability Risk Engine".
      In workspace mode the browser tab gives no address context.
      Fix: in page.tsx, add a useEffect that watches `result` and sets
      document.title to "<address> — Livability Risk Engine" when a result
      loads, and resets to the default when result is cleared.
      This is a client-side update; the static metadata in layout.tsx is fine
      for SSR and does not need to change.

  - id: app-014
    title: Add clear button to address input
    status: done
    priority: medium
    notes_for_next_agent: >
      The address input has no way to clear its value without manually
      selecting all text. Add a small × button that appears inside the input
      shell when address.length > 0. Clicking it should clear address, reset
      suggestions, and refocus the input. Style it with absolute positioning
      inside .search-input-stack, similar to the suggestion dropdown anchor.
      Do not show the clear button while isLoading.

  - id: app-015
    title: Accordion behavior for risk detail panels
    status: done
    priority: medium
    notes_for_next_agent: >
      In TopRiskGrid (score-experience.tsx), each risk card has an expand
      button. Currently all three can be open simultaneously, which pushes
      content far down the page.
      Fix: track a single activeCard ID in the TopRiskGrid component.
      Opening one card closes any previously open card. The expand button
      toggles: clicking an already-open card closes it, clicking a different
      card opens that one and closes the previous.

  - id: app-016
    title: Show score timestamp in Quick Read card
    status: done
    priority: low
    notes_for_next_agent: >
      The Quick Read supporting list (page.tsx) shows Data mode, Confidence,
      Active signals, Sources — but no indication of when the score was run.
      Fix: capture a scoredAt timestamp (new Date()) when setResult() is
      called in submitAddress(). Add it to supportingDetails as a new item:
      label "Scored at", value formatted as "h:mm a" (e.g. "2:34 PM").
      Use Intl.DateTimeFormat for formatting — no date library needed.

  - id: app-017
    title: Keyboard shortcut — slash key focuses address input
    status: done
    priority: low
    notes_for_next_agent: >
      Add a global keydown listener in page.tsx that focuses inputRef when
      the user presses "/" and no input/textarea/select is currently focused
      (check document.activeElement.tagName). Prevent the "/" character from
      being inserted into the input by calling event.preventDefault() before
      focusing. This is a standard pattern for search-first tools.

  - id: app-018
    title: Good-news empty state when no risks detected
    status: done
    priority: low
    notes_for_next_agent: >
      If the backend returns top_risks: [] the TopRiskGrid renders an empty
      grid with no message. This looks broken.
      Fix: in TopRiskGrid (score-experience.tsx), if riskCards.length === 0,
      render a small informational panel: "No active disruption signals
      detected near this address." with a note that the score reflects
      conditions at time of lookup.

  - id: app-019
    title: History dropdown closes on Escape key
    status: done
    priority: low
    notes_for_next_agent: >
      The history dropdown (showHistory) in page.tsx has no Escape key
      handler. Add one to the existing handleInputKeyDown or as a separate
      document-level listener scoped to when showHistory is true.
      Also close the dropdown when the user clicks outside the
      .history-dropdown-shell (extend the existing handleClickOutside
      useEffect or add a separate ref for the shell).

  - id: app-020
    title: Confidence dot color fix — LOW confidence should not look green/safe
    status: done
    priority: low
    notes_for_next_agent: >
      In globals.css, .confidence-dot--low is #3ce5b3 (mint green) and
      .confidence-dot--high is #ff7070 (red). These colors suggest low
      confidence is "safe" and high confidence is "dangerous", which is the
      wrong semantic — confidence is about certainty, not risk level.
      Fix: change .confidence-dot--low to rgba(255,255,255,0.35) (neutral
      grey-white) and .confidence-dot--medium to var(--warning) (#ffd497).
      Leave .confidence-dot--high as the brand blue (#8da5ff) — high
      confidence is a good, strong signal. Update any legend/tooltip copy
      that refers to these colors.

  - id: app-021
    title: Add aria-live region around score result section
    status: done
    priority: low
    notes_for_next_agent: >
      When a new score loads, screen reader users get no announcement.
      The loading state has aria-live="polite" on .loading-step-list but
      the results section has no equivalent.
      Fix: wrap the <section className="results results--loaded ..."> in a
      <div aria-live="polite" aria-atomic="false">. Also ensure the score
      number element has a meaningful aria-label like
      aria-label="Disruption score: 62 out of 100".

  - id: app-022
    title: Mobile topnav cleanup in workspace mode
    status: done
    priority: low
    notes_for_next_agent: >
      On screens ≤640px in workspace mode, the topnav shows: brand lockup +
      (Viewing + address + Recent + Score + Signals + Examples + Pricing).
      This overflows and wraps badly.
      Fix: at ≤640px in workspace mode, hide the Score/Signals/Examples
      anchor links from the topnav (they still exist in the page for larger
      screens). Keep Pricing and Recent. Use a CSS class toggled by
      workspaceMode or a media-query modifier on .topnav in globals.css.

  - id: app-023
    title: Add skip-to-main-content link for keyboard accessibility
    status: done
    priority: low
    notes_for_next_agent: >
      There is no skip nav link, so keyboard users must tab through the
      entire header before reaching the address input.
      Fix: add a visually-hidden <a href="#address"> as the first child of
      <body> (in layout.tsx or page.tsx). Style it to appear only on focus
      using a .skip-link CSS class in globals.css. This is a WCAG 2.1 AA
      requirement.

  - id: data-036
    title: Implement Chicago 311 requests, film permits, and special events data sources
    status: done
    priority: high
    github_issue: 91
    notes_for_next_agent: >
      Three new ingest scripts added:
        - backend/ingest/chicago_311_requests.py — pothole, water main break,
          cave-in, tree emergency from Socrata v6vf-nfxy (last 90 days).
        - backend/ingest/chicago_film_permits.py — film permit street holds
          from Socrata ivkd-2m2v (last 90 days + next 30 days).
        - backend/ingest/chicago_special_events.py — festivals, parades,
          marathons from Socrata r5kz-chrr (last 60 days + next 90 days).
      Three new normalizers added to backend/models/project.py:
        normalize_311_request(), normalize_film_permit(), normalize_special_event()
      Three new load functions added to backend/ingest/load_projects.py:
        load_311_requests(), load_film_permits(), load_special_events()
      run_pipeline.py updated with three new non-fatal steps:
        --skip-311, --skip-film, --skip-events flags added.
      Skipped for now:
        - Red light / speed camera violations (historical aggregates, not active disruptions)
        - Illinois Tollway construction (separate portal, needs ArcGIS research → data-037)
      Next: validate dataset IDs by running dry-run after DB is live,
      then create data-037 for Illinois Tollway construction.

  - id: data-037
    title: Research and implement Illinois Tollway construction data source
    status: backlog
    priority: medium
    github_issue: ~
    notes_for_next_agent: >
      Illinois Tollway construction data is NOT on the Chicago Data Portal.
      The Illinois Tollway publishes project data at:
        https://www.illinoistollway.com/road-projects (HTML page, not API)
        https://www.illinoistollway.com/roadwork/construction (alternative)
      Potential approaches:
        1. Check if IDOT ArcGIS REST API includes tollway projects
           (the existing idot_road_projects.py covers IDOT districts 1-9).
        2. Scrape illinoistollway.com — requires HTML parsing, fragile.
        3. Check https://gis.idot.illinois.gov for tollway layer.
      The IDOT ingest already covers state road construction near Chicago
      (District 1). Tollway is primarily I-90/94, I-88, I-294/I-90.
      If no clean API is found, consider using IDOT District 1 as sufficient
      coverage and marking this task as won't-fix.

  - id: data-038
    title: Expand permit and disruption data to top US cities — multi-city pipeline
    status: done
    priority: high
    github_issue: 102
    notes_for_next_agent: >
      New file: backend/ingest/us_city_permits.py
        9 US cities configured (Socrata): NYC, LA, Houston, Phoenix,
        Philadelphia, San Antonio, San Diego, Dallas, Austin.
        San Jose skipped — no Socrata portal (uses ArcGIS Hub).
        NYC also has a street closures dataset (i6b5-j7bu, address-only,
        geocode_fill will backfill lat/lon).
      New normalizer: normalize_us_city_permit() in backend/models/project.py.
      New loader: load_us_city_permits() in backend/ingest/load_projects.py.
        Glob pattern: us_city_permits_*.json
        --source us_cities added to load_projects.py --source choices.
        --us-cities-dir argument added to load_projects.py.
      run_pipeline.py updated:
        New step "Fetch US city permits (top 10 cities)" after IL cities step.
        --skip-us-cities flag added.
        Step is non_fatal=True so one city failure does not abort pipeline.
      IMPORTANT: Dataset IDs were researched from public Socrata catalog
      metadata but not live-verified due to environment constraints.
      Before relying on this data in production, run:
        python backend/ingest/us_city_permits.py --dry-run
      and check output for any cities returning 0 records or HTTP errors.
      If a city fails, verify its dataset_id at:
        https://<domain>/api/catalog/v1?q=building+permits&limit=5
      Next task: data-039 — validate US city dataset IDs via dry-run and
      fix any incorrect IDs found.

  - id: data-039
    title: Implement CKAN-based city permit ingest — Houston, Philadelphia, San Antonio, San Diego
    status: done
    priority: high
    github_issue: 105
    notes_for_next_agent: >
      Script: backend/ingest/us_city_permits_ckan.py
      Implements CKAN datastore_search (with SQL fallback) for 4 cities
      that do not use Socrata: Houston, Philadelphia, San Antonio, San Diego.
      Resource IDs in CITY_CONFIGS were researched from training knowledge
      — NOT live-verified. Before running in production:
        python backend/ingest/us_city_permits_ckan.py --city houston --discover
        python backend/ingest/us_city_permits_ckan.py --city philadelphia --discover
        python backend/ingest/us_city_permits_ckan.py --city san_antonio --discover
        python backend/ingest/us_city_permits_ckan.py --city san_diego --discover
      Then update resource_id (and field names if needed) in CITY_CONFIGS.
      Output: data/raw/us_city_permits_<source_key>.json (same schema as Socrata).
      Next task: data-040 — live-verify CKAN resource IDs and field names.

  - id: data-040
    title: Live-verify CKAN resource IDs and field names for 4 cities
    status: backlog
    priority: high
    github_issue: ~
    notes_for_next_agent: >
      data-038 added backend/ingest/us_city_permits.py with 9 US city configs.
      Dataset IDs were researched from training knowledge — not live-verified.
      Run: python backend/ingest/us_city_permits.py --dry-run
      For any city returning 0 records or HTTP errors, verify the correct
      dataset ID at:
        https://<domain>/api/catalog/v1?q=building+permits&limit=5
      Update the dataset_id and field names in CITY_CONFIGS as needed.
      Once all cities pass dry-run, mark this task done.

  - id: data-040
    title: Implement FEMA flood zones, crime trends, and Census ACS data — neighborhood quality layer
    status: done
    priority: high
    github_issue: 106
    notes_for_next_agent: >
      Four new files added:
        - backend/ingest/fema_flood_zones.py
            Queries FEMA NFHL ArcGIS REST API (Layer 28: S_Fld_Haz_Ar) for
            flood zone polygon centroids covering Chicago metro (Cook County).
            Classifies as HIGH/MODERATE/MINIMAL/UNKNOWN.
            Output: data/raw/fema_flood_zones.json
        - backend/ingest/chicago_crime_trends.py
            Queries Socrata dataset 31yy-ehbz (Crimes) for crime counts by
            community area (77 areas). Calculates 12-month trend vs prior year.
            Fetches community area polygon centroids from Chicago Data Portal.
            Output: data/raw/chicago_crime_trends.json
        - backend/ingest/census_acs.py
            Queries Census ACS 5-year API (2022 vintage) for Cook County
            census tracts. Variables: median income, population, vacancy rate,
            median housing age. Fetches tract centroids from TIGER web service.
            Output: data/raw/census_acs.json
        - backend/ingest/load_neighborhood_quality.py
            Loads staging files into neighborhood_quality DB table.
            Supports --source fema|crime|census|all, --dry-run.
      Schema change:
        - db/schema.sql: Added neighborhood_quality table with PostGIS geom
          (centroid point) for KNN spatial lookup. Three partial spatial indexes
          per region_type. Columns cover all three data sources in one table.
      Scoring change:
        - backend/scoring/query.py: Added get_neighborhood_context(lat, lon, conn).
          Three KNN queries (one per region_type). Returns dict or None.
        - backend/app/main.py: _score_live() now calls get_neighborhood_context()
          and includes neighborhood_context in the API response (non-fatal).
      Pipeline change:
        - run_pipeline.py: Added 4 new steps and 4 skip flags:
          --skip-fema, --skip-crime-trends, --skip-census-acs,
          --skip-neighborhood-quality
      Before relying on this data in production, run each script with --dry-run
      to verify API availability:
        python backend/ingest/fema_flood_zones.py --dry-run
        python backend/ingest/chicago_crime_trends.py --dry-run
        python backend/ingest/census_acs.py --dry-run
      Once the DB is live, run the full pipeline and validate:
        curl "$BACKEND_URL/score?address=100+W+Randolph+St+Chicago+IL"
        → response should include "neighborhood_context" field.
      Next: data-041 — validate neighborhood quality APIs and verify
      neighborhood_context appears in live /score responses.

  - id: data-041
    title: Validate neighborhood quality APIs and verify live /score neighborhood_context
    status: backlog
    priority: high
    github_issue: ~
    notes_for_next_agent: >
      data-040 added three ingest scripts and a loader for the neighborhood_quality
      table. Before this data is trusted in production, validate each API:
        1. Run dry-runs for each source:
             python backend/ingest/fema_flood_zones.py --dry-run
             python backend/ingest/chicago_crime_trends.py --dry-run
             python backend/ingest/census_acs.py --dry-run
           Confirm each prints sample records, not errors or 0 results.
        2. If FEMA returns 0 features: check that the NFHL MapServer layer 28
           is accessible and the bbox query works. The FEMA NFHL URL may need
           to be verified against https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer
        3. If Census TIGER returns 0 centroids: check INTPTLAT/INTPTLON field
           names. The TIGER web MapServer layer 8 should have these fields for
           2020 census boundaries. Try adding INTPTLAT20, INTPTLON20 as fallback.
        4. Once all three dry-runs succeed, run the full pipeline and verify:
             curl "$BACKEND_URL/score?address=100+W+Randolph+St+Chicago+IL"
             → should include neighborhood_context field with flood_risk,
               crime_trend, median_income, etc.
        5. If neighborhood_context is null: confirm neighborhood_quality table
           was populated (run db_summary.py) and that geom column is not all NULL.
