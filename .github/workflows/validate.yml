name: Validate demo readiness

# task: data-039
# lane: data
#
# Manual-trigger workflow that runs scripts/demo_smoke_check.py against a
# configured backend URL. It checks public /health and /score only, plus the
# admin-protected /health/db probe when ADMIN_SECRET is available.
#
# Required input:
#   backend_url — Railway backend public URL
#                 (e.g. https://livability-risk-engine.up.railway.app)
#
# Optional secrets:
#   LRE_API_KEY  — sent as X-API-Key when present
#   ADMIN_SECRET — sent as X-Admin-Secret when present; /health/db is skipped
#                  by the script when absent.

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Railway backend URL (e.g. https://your-app.up.railway.app)"
        required: true
        type: string
      require_live:
        description: "Fail if /health or /score responses are not in live mode"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      addresses:
        description: "Optional newline-separated addresses. Blank uses script defaults."
        required: false
        type: string

jobs:
  validate:
    name: Demo readiness smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run demo smoke check
        env:
          BACKEND_URL: ${{ github.event.inputs.backend_url }}
          REQUIRE_LIVE: ${{ github.event.inputs.require_live }}
          ADDRESSES: ${{ github.event.inputs.addresses }}
          LRE_API_KEY: ${{ secrets.LRE_API_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::backend_url input is required"
            exit 2
          fi

          args=(--backend-url "$BACKEND_URL")

          if [ "$REQUIRE_LIVE" = "true" ]; then
            args+=(--require-live)
          fi

          if [ -n "$ADDRESSES" ]; then
            while IFS= read -r address; do
              if [ -n "$address" ]; then
                args+=(--address "$address")
              fi
            done <<< "$ADDRESSES"
          fi

          python3 scripts/demo_smoke_check.py "${args[@]}"
