    notes_for_next_agent: >
      data-079 complete (issue #249).
      Added --mode daily|weekly|monthly flag to run_pipeline.py.
      _WEEKLY_SKIP_KEYS and _MONTHLY_SKIP_KEYS sets defined near line 759 control step routing.
      _step_mode(step) helper returns the mode for any step.
      When --mode is omitted, all steps run (backward compatible).
      WORKFLOW FILES NOT UPDATED: .github/workflows/ingest.yml could not be modified due to
      GitHub App permissions. The weekly and monthly cron triggers must be added manually:
        Weekly (Sunday 3:00am UTC):  cron "0 3 * * 0"  → python run_pipeline.py --mode weekly
        Monthly (1st of month 3:00am UTC): cron "0 3 1 * *" → python run_pipeline.py --mode monthly
        Daily stays as-is: python run_pipeline.py --mode daily
