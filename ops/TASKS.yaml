      - Example wording stays inside the MVP contract and tone rules.
    notes_for_next_agent: Use this to make demos feel calibrated and trustworthy across score bands.
  - id: product-007
    lane: product
    type: qa
    title: Create score review checklist for example addresses
    owner: product
    status: ready
    priority: medium
    files:
      - docs/03_scoring_model.md
      - docs/06_team_working_agreement.md
    dependencies:
      - product-003
      - product-004
    acceptance_criteria:
