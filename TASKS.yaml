---
# TASKS.yaml
# Chicago MVP — Data Lane task registry (active + backlog only)
# Completed tasks are in TASKS_ARCHIVE.yaml — do NOT read that file unless debugging a regression.
#
# Format:
#   id:          task identifier (data-NNN)
#   title:       short description
#   status:      backlog | in-progress | done
#   priority:    high | medium | low
#   github_issue: issue number on peterarriz/livability-risk-engine
#   notes_for_next_agent: key context for the agent picking this up next
#
# Last completed task: data-057 (tier-7 city expansion)
# Next task to create: data-058

tasks:
