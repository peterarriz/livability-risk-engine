---
# TASKS.yaml
# Chicago MVP — Data Lane task registry
# Format:
#   id:          task identifier (data-NNN)
#   title:       short description
#   status:      done | in-progress | backlog
#   priority:    high | medium | low
#   github_issue: issue number on peterarriz/livability-risk-engine
#   notes_for_next_agent: key context for the agent picking this up next

tasks:
  - id: data-001
    title: Define project schema and data model
    status: done
    priority: high
    notes_for_next_agent: >
      Schema lives in db/schema.sql. Canonical table is `projects`.
      All scoring queries run against `projects`, not raw tables.

  - id: data-002
    title: Ingest Chicago building permits from Socrata API
    status: done
    priority: high
    notes_for_next_agent: >
      Script: backend/ingest/building_permits.py.
      Output: data/raw/building_permits.json.
      Uses CHICAGO_SOCRATA_APP_TOKEN env var (optional).

  - id: data-003
    title: Data model — Project dataclass and normalization helpers
    status: done
    priority: high
    notes_for_next_agent: >
      backend/models/project.py: Project dataclass, normalize_permit,
      normalize_closure. These are the only normalization functions
      that should feed into the projects table.

  - id: data-004
    title: Ingest Chicago CDOT street closures from Socrata API
    status: done
    priority: high
    notes_for_next_agent: >
      Script: backend/ingest/street_closures.py.
      Output: data/raw/street_closures.json.
      Street closures carry the highest weight in the scoring model.

  - id: data-005
    title: Canonical projects table schema (PostGIS)
    status: done
    priority: high
    notes_for_next_agent: >
      db/schema.sql: projects table with PostGIS geom column.
      ST_DWithin on geom is the primary scoring query pattern.

  - id: data-006
    title: Normalize building permits into canonical projects table
    status: done
    priority: high
    notes_for_next_agent: >
      normalize_permit() in backend/models/project.py.
      Called by load_projects.py.

  - id: data-007
    title: Normalize street closures into canonical projects table
    status: done
    priority: high
    notes_for_next_agent: >
      normalize_closure() in backend/models/project.py.
      Called by load_projects.py.

  - id: data-008
    title: Geocoding — address to lat/lon via Chicago geocoder
    status: done
    priority: high
    notes_for_next_agent: >
      backend/ingest/geocode.py: geocode_address(address) → (lat, lon) | None.
      Uses Chicago PDOK / Nominatim as fallback.

  - id: data-009
    title: Scoring query — ST_DWithin radius query against projects table
    status: done
    priority: high
    notes_for_next_agent: >
      backend/scoring/query.py: get_nearby_projects(), compute_score().
      Radius is 500m. Returns list of NearbyProject(project, distance_m).

  - id: data-010
    title: Ingest freshness check
    status: done
    priority: medium
    notes_for_next_agent: >
      backend/ingest/check_freshness.py. Reads ingest_runs table.
      Used by /health to expose last_ingest_status (future).

  - id: data-011
    title: Geocode fill — backfill missing coordinates in staging files
    status: done
    priority: medium
    notes_for_next_agent: >
      backend/ingest/geocode_fill.py: reads staging JSON, geocodes records
      missing lat/lon, writes back. Run before load_projects.py.

  - id: data-012
    title: DB summary / row count reporter
    status: done
    priority: low
    notes_for_next_agent: >
      backend/ingest/db_summary.py: prints row counts for all tables.
      Useful for post-ingest validation.

  - id: data-013
    title: DB loader — upsert normalized Project records into projects table
    status: done
    priority: high
    notes_for_next_agent: >
      backend/ingest/load_projects.py. Reads staging JSON files,
      normalizes, upserts into projects table with ON CONFLICT idempotency.
      Populates geom column from lat/lon. Supports --dry-run.

  - id: data-014
    title: Audit DB hosting requirements and document options
    status: done
    priority: high
    notes_for_next_agent: >
      Evaluated Railway, Supabase, Render. Railway chosen — supports
      PostGIS, easy DATABASE_URL injection, free tier available.
      DATABASE_URL added as GitHub secret.

  - id: data-015
    title: Provision Railway Postgres+PostGIS instance
    status: done
    priority: high
    notes_for_next_agent: >
      Railway DB is live. DATABASE_URL is in GitHub secrets.
      Schema not yet applied as of data-015 completion.

  - id: data-016
    title: Create pipeline orchestrator and schema apply script
    status: done
    priority: high
    notes_for_next_agent: >
      run_pipeline.py at repo root orchestrates all 4 ingest steps.
      scripts/apply_schema.sh applies db/schema.sql via psql.
      Both accept DATABASE_URL env var.

  - id: data-017
    title: Apply schema and run live ingest against Railway database
    status: in-progress
    priority: high
    github_issue: 30
    notes_for_next_agent: >
      Code changes are done (PR on branch claude/issue-30-20260319-1800):
        - run_pipeline.py created
        - scripts/apply_schema.sh created
        - Demo fallback removed from backend/app/main.py
        - Demo fallback removed from frontend/src/lib/api.ts
      Remaining manual steps (require DATABASE_URL secret):
        1. Apply schema: DATABASE_URL=$SECRET ./scripts/apply_schema.sh
        2. Run ingest:   DATABASE_URL=$SECRET python run_pipeline.py
        3. Validate:     curl "$BACKEND_URL/health" → db_connection=true
                         curl "$BACKEND_URL/score?address=100+W+Randolph+St+Chicago"
      Once validated, this task is done. Next: data-018 (schedule ingest cron).

  - id: data-018
    title: Deploy FastAPI backend to Railway — code delivery
    status: done
    priority: high
    github_issue: 41
    notes_for_next_agent: >
      Delivered backend/railway.toml, backend/Procfile, and root railway.toml.
      CORS set via FRONTEND_ORIGIN env var. /health endpoint live in main.py.
      Manual deploy steps tracked in data-019 (issue #49).

  - id: data-019
    title: Deploy FastAPI backend to Railway — operator steps and validation
    status: in-progress
    priority: high
    github_issue: 49
    notes_for_next_agent: >
      Code is in place (railway.toml, Procfile, /health endpoint).
      Remaining manual steps (require dashboard access):
        1. railway.app → New Project → Deploy from GitHub → peterarriz/livability-risk-engine
        2. Add Railway Postgres service to same project (DATABASE_URL auto-injected)
        3. Set FRONTEND_ORIGIN = https://livability-risk-engine.vercel.app
        4. Copy Railway public URL (e.g. https://livability-risk-engine.up.railway.app)
        5. vercel.com → Settings → Env Vars → NEXT_PUBLIC_API_URL = <railway-url>
        6. Redeploy frontend
        7. Validate: curl <railway-url>/health  → db_connection=true
                     curl "<railway-url>/score?address=100+W+Randolph+St+Chicago+IL"
      Once validated, mark this task done and proceed to data-020.

  - id: data-020
    title: Schedule recurring ingest pipeline via GitHub Actions cron
    status: done
    priority: high
    notes_for_next_agent: >
      .github/workflows/ingest.yml created. Runs daily at 06:00 UTC.
      Applies schema (idempotent), runs run_pipeline.py, then smoke-checks
      active project count. Manual dispatch supported with dry_run and
      skip_geocode inputs. Requires DATABASE_URL GitHub secret.
      CHICAGO_SOCRATA_APP_TOKEN optional but recommended.

  - id: data-019
    title: Add Railway deployment config for FastAPI backend
    status: done
    priority: high
    notes_for_next_agent: >
      railway.toml and Procfile committed. Manual steps still required:
        1. Railway dashboard → New Project → Deploy from GitHub repo
        2. Set DATABASE_URL + FRONTEND_ORIGIN env vars in Railway
        3. Copy Railway public URL → set as NEXT_PUBLIC_API_URL in Vercel
        4. Redeploy Vercel frontend
        5. Validate: curl <railway-url>/health → db_connection=true

  - id: data-026
    title: Neighborhood heat map pages /neighborhood/[slug]
    status: done
    priority: medium
    github_issue: 58
    notes_for_next_agent: >
      Backend: GET /neighborhood/<slug> returns projects within bbox + metadata.
               GET /neighborhoods returns list of all 8 neighborhoods.
               8 bounding boxes defined in _NEIGHBORHOODS dict in backend/app/main.py.
               Falls back to empty project list when DB is not configured.
      Frontend: frontend/src/app/neighborhood/[slug]/page.tsx — Leaflet map with
               circle markers colored by impact_type, project list with color-coded
               left border, neighborhood summary bar.
               fetchNeighborhood() and fetchNeighborhoods() added to frontend/src/lib/api.ts.
      Next: Consider adding a /neighborhoods index page and linking from the homepage.

  - id: data-033
    title: Illinois city permits ingest — Cook County + IL cities
    status: done
    priority: medium
    github_issue: 66
    notes_for_next_agent: >
      Script: backend/ingest/il_city_permits.py.
      Output: data/raw/il_city_permits_<source_key>.json.
      Cook County dataset: datacatalog.cookcountyil.gov / 6yjf-dfxs.
      Chicago Special Events (ahsk-uzm8) added in data-034 — needs dataset
      ID verification before relying on it in production.

  - id: data-034
    title: Research and add remaining Illinois open data sources
    status: done
    priority: medium
    github_issue: 68
    notes_for_next_agent: >
      Sources researched and implemented:
        - CTA Planned Service Alerts (IMPLEMENTED):
            Script: backend/ingest/cta_alerts.py
            Output: data/raw/cta_alerts.json
            API: lapi.transitchicago.com/api/1.0/alerts.aspx?outputType=JSON&planned=1
            No API key required. Returns construction/track-work alerts.
            Normalizer: normalize_cta_alert() in backend/models/project.py.
            Loader: load_cta_alerts() in backend/ingest/load_projects.py.
            Pipeline step added to run_pipeline.py (--skip-cta to bypass).
        - Chicago Special Events Permits (ADDED TO il_city_permits.py):
            source_key: chicago_special_events
            Domain: data.cityofchicago.org, dataset_id: ahsk-uzm8
            WARNING: dataset_id ahsk-uzm8 and field names need live
            verification. Run:
              curl "https://data.cityofchicago.org/api/catalog/v1?q=special+event+permit&limit=5"
            If wrong ID, pipeline logs a warning and continues (no failure).
      Sources researched and SKIPPED (no viable public API):
        - ComEd utility work permits: no public API
        - Peoples Gas infrastructure: no public API
        - DuPage/Lake/Will/Kane County permits: ArcGIS Hub portals, no
          Socrata-compatible building permits API; would need a custom
          ArcGIS ingest similar to idot_road_projects.py
        - Metra construction: GTFS data only, no disruption-specific REST API
        - Illinois state event permits: no known public API
      Next: Verify Chicago Special Events dataset ID (ahsk-uzm8) is correct.

  - id: data-035
    title: Verify Chicago Special Events dataset ID and validate CTA alerts pipeline
    status: backlog
    priority: medium
    github_issue:
    notes_for_next_agent: >
      Two validation tasks from data-034:
      1. Verify Chicago Special Events Permits dataset ID:
           Run: python backend/ingest/il_city_permits.py --city chicago_special_events --dry-run
           If 0 records or 404, find correct dataset ID via:
             curl "https://data.cityofchicago.org/api/catalog/v1?q=special+event+permit&limit=5"
           Then update dataset_id and field names in il_city_permits.py CITY_CONFIGS.
      2. Validate CTA alerts pipeline end-to-end:
           Run: python backend/ingest/cta_alerts.py --dry-run
           Expected: CTA planned service alerts returned and normalized.
           Verify sample record shows headline, event_start, address.
      3. Once DATABASE_URL is available, run the full pipeline and confirm
         cta_alerts records appear in the projects table.
