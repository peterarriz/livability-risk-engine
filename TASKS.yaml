      DB: amenity_cache table (lat_bucket NUMERIC(6,2), lon_bucket NUMERIC(6,2), amenities JSONB,
      amenity_score INT, fetched_at); unique index on (lat_bucket, lon_bucket); 7-day TTL.
      Backend: GET /nearby-amenities?lat=&lon= endpoint in main.py — cache-first (7-day),
