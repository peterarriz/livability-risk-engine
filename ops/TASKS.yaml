      - Top-risk phrasing guidance stays simple enough for App rendering.
    notes_for_next_agent: Completed by defining buyer-facing guidance that `traffic` should explicitly cover curb and parking access when materially relevant, while keeping those impacts folded into the existing MVP API field.
  - id: product-016
    lane: product
    type: qa
    title: Approve one buyer-facing demo response per score band
    owner: product
    status: backlog
    priority: medium
    files:
      - docs/04_api_contracts.md
      - docs/product_qa_checklist.md
    dependencies:
