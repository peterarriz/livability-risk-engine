        3. run_pipeline.py — row_count_check runs as a non-fatal step
           after "Load neighborhood quality". Exposes --skip-row-count-check
           flag if needed.
      Workflow notification (Slack webhook): NOT implemented. The GitHub App
      does NOT have permission to modify .github/workflows/ files. The
      existing ingest.yml already has a "Notify on failure" step that logs
      ::error:: to the Actions log. To add Slack: set SLACK_WEBHOOK_URL
      secret and edit .github/workflows/ingest.yml manually:
        - name: Notify Slack on failure
          if: failure()
          run: |
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-type: application/json' \
              --data '{"text":"Ingest pipeline FAILED: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
      Next: validate /health/db returns real last_ingest_at after a pipeline
      run. Consider adding row_count to ingest_runs writes in load_projects.py
      if record_count is not currently being recorded.

