  - id: data-043
    title: Wire per-key API call metering to api_keys table
    status: done
    priority: high
    github_issue: ~
    notes_for_next_agent: >
      Completed 2026-03-23. Three changes landed:
      1. db/schema.sql: api_keys table added (was missing from schema entirely).
         Includes call_count INT DEFAULT 0 and last_called_at TIMESTAMPTZ.
         Two idempotent ALTER TABLE ... ADD COLUMN IF NOT EXISTS statements
         at the bottom of schema.sql handle existing Railway deployments.
         Run `bash scripts/apply_schema.sh` to apply to Railway.
      2. backend/app/main.py verify_api_key: the UPDATE that sets last_used_at
         now also sets last_called_at = now() and call_count = call_count + 1.
         Fire-and-forget (errors logged, never fail the /score request).
      3. backend/app/main.py GET /usage: new endpoint, requires valid API key
