  - id: data-037
    title: Research and implement Illinois Tollway construction data source
    status: done
    priority: medium
    github_issue: 96
    notes_for_next_agent: >
      DECISION: won't-fix. No public REST API exists for Illinois Tollway
      (ITSHA) construction data. Research findings:
        1. IDOT ArcGIS (idot_road_projects.py) covers IDOT-managed construction
           only. Illinois Tollway (ITSHA) is a separate authority — their projects
           do NOT systematically appear in the IDOT dataset.
        2. illinoistollway.com/road-projects is HTML-only (no API, no JSON feed).
           Scraping would be fragile and is not a recommended approach.
        3. gis.idot.illinois.gov is IDOT's own GIS, separate from ITSHA.
           No tollway-specific construction layer is available publicly.
      Coverage rationale: Tollways (I-90/Jane Addams, I-88/Reagan, I-294/Veterans,
      I-190) are limited-access expressways. Construction on them does not directly
      affect neighborhood-level livability at the address level the way arterial
      street closures, building permits, or 311 requests do. IDOT District 1 data
      provides sufficient coverage for state/federal road construction impacting
      Chicago neighborhoods. Next: data-038.

  - id: data-042
    title: Claude-powered signal card rewriter with DB cache
    status: done
    priority: high
    github_issue: ~
    notes_for_next_agent: >
      Problem: top_risk card titles exposed raw permit strings like
      "Lane or curb Closure near huron between addresses 900–909 (Permitted work
      (opening phase)) closure ~ ~144 ft; active through 2026-04-15".
      Solution: backend/scoring/rewrite.py calls claude-opus-4-6 to generate a
      clean 1-line title and 1-sentence description for each top_risk_detail.
      Cache: signal_rewrites table (project_id TEXT PK) stores results so each
      unique permit/closure is rewritten at most once — no repeated API calls.
      Integration: _score_live() in main.py calls enrich_top_risk_details()
      with the open DB connection after compute_score() and before returning.
      The DB connection was moved inside the try/finally block to support this.
      Frontend: buildRiskCards() in score-experience.tsx checks
      detail.rewritten_title / detail.rewritten_description first; falls back to
      the heuristic inferDriverTitle() / deriveDriverRationale() if null.
      Types: TopRiskDetail in api.ts has rewritten_title?: string|null and
      rewritten_description?: string|null (optional for backward compat).
      Dependency: anthropic>=0.50.0 added to backend/requirements.txt.
      Schema: signal_rewrites table added to db/schema.sql (idempotent CREATE IF NOT EXISTS).
      Operator steps:
        1. Apply updated schema: ./scripts/apply_schema.sh
           (adds signal_rewrites table — idempotent, safe to run again)
        2. Set ANTHROPIC_API_KEY env var on Railway backend service
        3. Optionally set CLAUDE_REWRITE_MODEL=claude-haiku-4-5 for lower latency
           (default is claude-opus-4-6)
        4. Redeploy backend
        5. Validate: hit /score for any address and confirm top_risk_details items
           contain non-null rewritten_title and rewritten_description fields.
      Graceful degradation: if ANTHROPIC_API_KEY is unset or call fails, the
      original top_risk_details are returned unchanged (no rewritten fields added).
      Cache is lazily populated — first request per project_id pays API cost;
      all subsequent requests are free DB reads.
      Next: consider data-043 to backfill rewrites for all existing projects
      in a background job so first-load latency is eliminated.

  - id: data-041
    title: Fix neighborhood page — zero project count and missing map circles
    status: done
    priority: high
    github_issue: ~
    notes_for_next_agent: >
      Root cause was a three-part bug in _get_projects_in_bbox (backend/app/main.py):
        1. Column name mismatch: query used `lat, lon` but the projects table
           has `latitude, longitude`. This caused a SQL error that was silently
           caught, returning [] every time even with live DB data.
        2. Filter used lat/lon BETWEEN instead of the spatial index. Switched to
           ST_Within(geom, ST_MakeEnvelope(min_lon, min_lat, max_lon, max_lat, 4326))
           to match the /score endpoint pattern and use the GIST index on geom.
        3. Coordinates extracted with COALESCE(ST_Y(geom), latitude) and
           COALESCE(ST_X(geom), longitude) so rows where lat/lon columns are NULL
           but geom is populated are still returned with valid coordinates for map rendering.
      Status filter expanded from 'active' to ('active', 'planned') to match
      the score endpoint's SCOREABLE_STATUSES.
      Frontend (frontend/src/app/neighborhood/[slug]/page.tsx):
        - Fallback message updated to: "No active signals in this neighborhood
          right now — check back after the next daily data refresh at 06:00 UTC."
      Next: validate with live DB by hitting /neighborhood/wicker-park and
      confirming project_count > 0 and map circles render.

