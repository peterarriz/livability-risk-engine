        - backend/ingest/nyc_crime_trends.py — NYPD Complaint Data from
          data.cityofnewyork.us. Queries both historic (qgea-i56i) and YTD
          (5uac-w243) datasets, merges results for full 24-month coverage.
          Grouped by addr_pct_cd (precinct, ~77 NYPD precincts).
      All three scripts follow the chicago_crime_trends.py pattern exactly:
        - SoQL GROUP BY with server-side aggregation.
        - Approximate centroids via avg(latitude)/avg(longitude) in the GROUP BY.
        - region_type matches district type (sector or precinct).
        - Output to data/raw/{city}_crime_trends.json.
        - --dry-run support and SOCRATA_APP_TOKEN env var.
