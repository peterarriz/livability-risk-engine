version: 1
settings:
  actionable_statuses:
    - ready
    - in_progress
  dependency_ready_statuses:
    - ready
    - in_progress
    - done
  blocked_statuses:
    - blocked
lanes:
  product:
    display_name: Product
    ready_queue_target: 3
    current_focus:
      - product-008
    blockers: []
    update_when:
      - A product task changes status.
      - Product adds or removes acceptance criteria.
      - Product changes lane priorities or blocks another lane.
    notes: Entire monetization foundation is complete (product-008 through product-025 all done). Docs produced — buyer_personas.md, pitch_narrative.md, demo_script.md, pricing_model.md, outreach_templates.md, success_metrics.md, competitive_positioning.md, pilot_terms.md, faq.md. Product lane queue is now empty — run generate_tasks.py to surface the next batch of ready tasks.
  data:
    display_name: Data
    ready_queue_target: 3
    current_focus:
      - data-005
      - data-006
      - data-007
    blockers: []
    update_when:
      - A data ingestion or normalization task changes status.
      - A dependency from Product or App blocks data delivery.
      - Data decides the next source or schema checkpoint.
    notes: data-001, data-002, and data-004 are done. Next focus is canonical projects table (data-005) and normalization tasks (data-006, data-007). data-005 must complete before data-006 and data-007 can start.
  app:
    display_name: App
    ready_queue_target: 3
    current_focus:
      - app-008
    blockers:
      - data-009: Implement radius query for nearby projects before App can wire the live score flow.
    update_when:
      - An app task changes status.
      - App is waiting on Data output or Product contract decisions.
      - The demo flow needs a different next-ready task.
    notes: Keep the queue centered on the API and the minimal demo frontend.
