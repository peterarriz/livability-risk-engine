  - id: data-046
    title: Add utility outage and repair data sources to scoring model
    status: backlog
    priority: medium
    github_issue: ~
    notes_for_next_agent: >
      Research and implement:
        1. Chicago Water Main Breaks — check if 311 dataset v6vf-nfxy (already ingested)
           can be filtered by SR_TYPE='Water Main Break' instead of a separate source.
        2. ComEd Planned Outages — check comed.com/outages for API. If no API: won't-fix.
        3. Peoples Gas construction — check Chicago Data Portal or ILCC filings.
      For any source found: add ingest script, normalizer in project.py using
      impact_type 'utility_outage' or 'utility_repair', base_weight in query.py
      (suggested: utility_outage=25, utility_repair=15), load function in
      load_projects.py, and --skip-utilities flag in run_pipeline.py.

  - id: data-038
    title: Add CDOT traffic signal outage data source
    status: backlog
    priority: medium
    github_issue: ~
    notes_for_next_agent: >
      Add Chicago CDOT Traffic Signal Outages as a disruption signal.
      Search data.cityofchicago.org for "traffic signal" or "signal outage".
      Implementation pattern mirrors chicago_311_requests.py:
        - Fetch active outages from Socrata (filter status='Active')
        - normalize_signal_outage() in project.py
        - load_signal_outages() in load_projects.py
        - --skip-signals flag in run_pipeline.py
        - Scoring weight: similar to 311 requests (~0.5–0.8 relative to closures)
      Verify dataset ID and field names via dry-run before wiring into pipeline.

