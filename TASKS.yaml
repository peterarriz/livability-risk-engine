      wrong semantic — confidence is about certainty, not risk level.
      Fix: change .confidence-dot--low to rgba(255,255,255,0.35) (neutral
      grey-white) and .confidence-dot--medium to var(--warning) (#ffd497).
      Leave .confidence-dot--high as the brand blue (#8da5ff) — high
      confidence is a good, strong signal. Update any legend/tooltip copy
      that refers to these colors.

