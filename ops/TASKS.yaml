  dependencies:
  - app-002
  acceptance_criteria:
  - Score renders.
  - Confidence or severity renders.
  notes_for_next_agent: Keep the component reusable for mocked and real data.
- id: app-006
  lane: app
  type: feature
  title: Render top risks and explanation
  owner: app
  status: backlog
  priority: medium
  files:
  - frontend/src/components/RiskList.tsx
  dependencies:
  - app-005
  acceptance_criteria:
  - Risks displayed cleanly.
  - Explanation text visible near the score.
  notes_for_next_agent: Preserve the API order for top contributors.
- id: app-007
  lane: app
  type: feature
  title: Add map view (Mapbox or Leaflet)
  owner: app
  status: backlog
  priority: low
  files:
  - frontend/src/components/Map.tsx
  dependencies:
  - app-004
  acceptance_criteria:
  - Map renders.
  - Projects plotted.
  notes_for_next_agent: This is demo polish; defer if it slows core API work.
- id: app-008
  lane: app
  type: integration
  title: Connect frontend to real backend
  owner: app
  status: backlog
  priority: high
  files:
  - frontend/src/lib/api.ts
  dependencies:
  - data-009
  acceptance_criteria:
  - Real score endpoint used.
  - Error states handled for empty responses.
  notes_for_next_agent: Keep mocked mode available until Data is stable.
- id: product-006
  lane: product
  type: definition
  title: Define confidence rubric for score responses
  owner: product
  status: ready
  priority: medium
  files:
  - docs/04_api_contracts.md
  dependencies:
  - product-002
  acceptance_criteria:
  - HIGH, MEDIUM, and LOW confidence rules are documented.
  - Rubric can be applied without changing scoring logic.
  notes_for_next_agent: Keep the rubric simple enough for App to render directly.
- id: app-009
  lane: app
  type: qa
  title: Add mocked score endpoint smoke-check task
  owner: app
  status: ready
  priority: medium
  files:
  - docs/handoffs/app.md
  - README.md
  dependencies:
  - app-002
  acceptance_criteria:
  - Mocked backend check steps are documented.
  - The task is small enough to complete before real data wiring.
  notes_for_next_agent: Keep this focused on the mocked `/score` path so App can stay unblocked.
