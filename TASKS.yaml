---
# TASKS.yaml
# Chicago MVP — Data Lane task registry
# Format:
#   id:          task identifier (data-NNN)
#   title:       short description
#   status:      done | in-progress | backlog
#   priority:    high | medium | low
#   github_issue: issue number on peterarriz/livability-risk-engine
#   notes_for_next_agent: key context for the agent picking this up next

tasks:
  - id: data-001
    title: Define project schema and data model
    status: done
    priority: high
    notes_for_next_agent: >
      Schema lives in db/schema.sql. Canonical table is `projects`.
      All scoring queries run against `projects`, not raw tables.

  - id: data-002
    title: Ingest Chicago building permits from Socrata API
    status: done
    priority: high
    notes_for_next_agent: >
      Script: backend/ingest/building_permits.py.
      Output: data/raw/building_permits.json.
      Uses CHICAGO_SOCRATA_APP_TOKEN env var (optional).

  - id: data-003
    title: Data model — Project dataclass and normalization helpers
    status: done
    priority: high
    notes_for_next_agent: >
      backend/models/project.py: Project dataclass, normalize_permit,
      normalize_closure. These are the only normalization functions
      that should feed into the projects table.

  - id: data-004
    title: Ingest Chicago CDOT street closures from Socrata API
    status: done
    priority: high
    notes_for_next_agent: >
      Script: backend/ingest/street_closures.py.
      Output: data/raw/street_closures.json.
      Street closures carry the highest weight in the scoring model.

  - id: data-005
    title: Canonical projects table schema (PostGIS)
    status: done
    priority: high
    notes_for_next_agent: >
      db/schema.sql: projects table with PostGIS geom column.
      ST_DWithin on geom is the primary scoring query pattern.

  - id: data-006
    title: Normalize building permits into canonical projects table
    status: done
    priority: high
    notes_for_next_agent: >
      normalize_permit() in backend/models/project.py.
      Called by load_projects.py.

  - id: data-007
    title: Normalize street closures into canonical projects table
    status: done
    priority: high
    notes_for_next_agent: >
      normalize_closure() in backend/models/project.py.
      Called by load_projects.py.

  - id: data-008
    title: Geocoding — address to lat/lon via Chicago geocoder
    status: done
    priority: high
    notes_for_next_agent: >
      backend/ingest/geocode.py: geocode_address(address) → (lat, lon) | None.
      Uses Chicago PDOK / Nominatim as fallback.

  - id: data-009
    title: Scoring query — ST_DWithin radius query against projects table
    status: done
    priority: high
    notes_for_next_agent: >
      backend/scoring/query.py: get_nearby_projects(), compute_score().
      Radius is 500m. Returns list of NearbyProject(project, distance_m).

  - id: data-010
    title: Ingest freshness check
    status: done
    priority: medium
    notes_for_next_agent: >
      backend/ingest/check_freshness.py. Reads ingest_runs table.
      Used by /health to expose last_ingest_status (future).

  - id: data-011
    title: Geocode fill — backfill missing coordinates in staging files
    status: done
    priority: medium
    notes_for_next_agent: >
      backend/ingest/geocode_fill.py: reads staging JSON, geocodes records
      missing lat/lon, writes back. Run before load_projects.py.

  - id: data-012
    title: DB summary / row count reporter
    status: done
    priority: low
    notes_for_next_agent: >
      backend/ingest/db_summary.py: prints row counts for all tables.
      Useful for post-ingest validation.

  - id: data-013
    title: DB loader — upsert normalized Project records into projects table
    status: done
    priority: high
    notes_for_next_agent: >
      backend/ingest/load_projects.py. Reads staging JSON files,
      normalizes, upserts into projects table with ON CONFLICT idempotency.
      Populates geom column from lat/lon. Supports --dry-run.

  - id: data-014
    title: Audit DB hosting requirements and document options
    status: done
    priority: high
    notes_for_next_agent: >
      Evaluated Railway, Supabase, Render. Railway chosen — supports
      PostGIS, easy DATABASE_URL injection, free tier available.
      DATABASE_URL added as GitHub secret.

  - id: data-015
    title: Provision Railway Postgres+PostGIS instance
    status: done
    priority: high
    notes_for_next_agent: >
      Railway DB is live. DATABASE_URL is in GitHub secrets.
      Schema not yet applied as of data-015 completion.

  - id: data-016
    title: Create pipeline orchestrator and schema apply script
    status: done
    priority: high
    notes_for_next_agent: >
      run_pipeline.py at repo root orchestrates all 4 ingest steps.
      scripts/apply_schema.sh applies db/schema.sql via psql.
      Both accept DATABASE_URL env var.

  - id: data-017
    title: Apply schema and run live ingest against Railway database
    status: done
    priority: high
    github_issue: 30
    notes_for_next_agent: >
      DB is fully live on Railway (public URL in DATABASE_URL GitHub secret).
      Schema applied idempotently via scripts/apply_schema.sh.
      Daily ingest pipeline ran successfully (run #7, 13m 45s).
      Demo fallback removed from backend/app/main.py /score endpoint.
      Demo fallback removed from frontend/src/lib/api.ts fetchScore().
      /score now returns live data or raises HTTP errors — no silent demo mode.

  - id: data-018
    title: Deploy FastAPI backend to Railway — code delivery
    status: done
    priority: high
    github_issue: 41
    notes_for_next_agent: >
      Delivered backend/railway.toml, backend/Procfile, and root railway.toml.
      CORS set via FRONTEND_ORIGIN env var. /health endpoint live in main.py.
      Manual deploy steps tracked in data-019 (issue #49).

  - id: data-019
    title: Deploy FastAPI backend to Railway — operator steps and validation
    status: done
    priority: high
    github_issue: 49
    notes_for_next_agent: >
      Railway backend is live at https://livability-risk-engine-production-2bad.up.railway.app.
      /health returns {"status":"ok","mode":"live","db_configured":true}.
      NEXT_PUBLIC_API_URL set in Vercel to Railway URL. Frontend redeployed from main.
      End-to-end live scoring confirmed working.

  - id: data-020
    title: Schedule recurring ingest pipeline via GitHub Actions cron
    status: done
    priority: high
    notes_for_next_agent: >
      .github/workflows/ingest.yml created. Runs daily at 06:00 UTC.
      Applies schema (idempotent), runs run_pipeline.py, then smoke-checks
      active project count. Manual dispatch supported with dry_run and
      skip_geocode inputs. Requires DATABASE_URL GitHub secret.
      CHICAGO_SOCRATA_APP_TOKEN optional but recommended.

  - id: data-019
    title: Add Railway deployment config for FastAPI backend
    status: done
    priority: high
    notes_for_next_agent: >
      railway.toml and Procfile committed. Manual steps still required:
        1. Railway dashboard → New Project → Deploy from GitHub repo
        2. Set DATABASE_URL + FRONTEND_ORIGIN env vars in Railway
        3. Copy Railway public URL → set as NEXT_PUBLIC_API_URL in Vercel
        4. Redeploy Vercel frontend
        5. Validate: curl <railway-url>/health → db_connection=true

# ---------------------------------------------------------------------------
# App lane — product / UX tasks
# Lane: app
# Format mirrors data lane above.
# ---------------------------------------------------------------------------

  - id: app-009
    title: Fix 4 small UX bugs (confidence reasons, alert, demo chips, compare link)
    status: done
    priority: high
    github_issue: ~
    notes_for_next_agent: >
      Committed on branch claude/improve-livability-ux-i8yCL.
      1. Report page now calls getConfidenceReasons() instead of passing [].
      2. Export PDF button is now an <a href="#pricing-section"> not alert().
      3. Demo section chips use handleSuggestionSelect + scrollIntoView.
      4. Compare link focuses + scrolls to address input.

  - id: app-010
    title: Fix icon-btn anchor tag missing text-decoration none
    status: done
    priority: high
    notes_for_next_agent: >
      After app-009, the "Export PDF" button is an <a> using class icon-btn.
      The .icon-btn CSS was written for <button> elements — it does not set
      text-decoration: none or display: inline-flex, so some browsers will
      render a visible underline and the layout may shift.
      Fix: add text-decoration: none and ensure display: inline-flex to
      .icon-btn in globals.css, and audit any other .action-btn usage on <a>.

  - id: app-011
    title: Escape key closes save report modal
    status: done
    priority: high
    notes_for_next_agent: >
      The save modal (showSaveModal) in page.tsx has no Escape key handler.
      Keyboard users cannot dismiss it without clicking the close button.
      Fix: add a useEffect in page.tsx that listens for keydown "Escape"
      and calls setShowSaveModal(false) when the modal is open.
      Also add email validation before enabling the CTA button so it is not
      always clickable regardless of input.

  - id: app-012
    title: Risk card grid empty columns when fewer than 3 risks
    status: done
    priority: medium
    notes_for_next_agent: >
      .risk-card-grid uses grid-template-columns: repeat(3, minmax(0, 1fr)).
      When top_risks has 1 or 2 items the grid renders empty columns that
      look like layout bugs.
      Fix: in score-experience.tsx, set the grid column count dynamically
      based on the number of risk cards (clamp to 1–3). Either via an inline
      style or a BEM modifier class (risk-card-grid--1col, --2col, --3col).

  - id: app-013
    title: Update document.title when address result loads
    status: done
    priority: medium
    notes_for_next_agent: >
      layout.tsx exports a static metadata title "Livability Risk Engine".
      In workspace mode the browser tab gives no address context.
      Fix: in page.tsx, add a useEffect that watches `result` and sets
      document.title to "<address> — Livability Risk Engine" when a result
      loads, and resets to the default when result is cleared.
      This is a client-side update; the static metadata in layout.tsx is fine
      for SSR and does not need to change.

  - id: app-014
    title: Add clear button to address input
    status: done
    priority: medium
    notes_for_next_agent: >
      The address input has no way to clear its value without manually
      selecting all text. Add a small × button that appears inside the input
      shell when address.length > 0. Clicking it should clear address, reset
      suggestions, and refocus the input. Style it with absolute positioning
      inside .search-input-stack, similar to the suggestion dropdown anchor.
      Do not show the clear button while isLoading.

  - id: app-015
    title: Accordion behavior for risk detail panels
    status: done
    priority: medium
    notes_for_next_agent: >
      In TopRiskGrid (score-experience.tsx), each risk card has an expand
      button. Currently all three can be open simultaneously, which pushes
      content far down the page.
      Fix: track a single activeCard ID in the TopRiskGrid component.
      Opening one card closes any previously open card. The expand button
      toggles: clicking an already-open card closes it, clicking a different
      card opens that one and closes the previous.

  - id: app-016
    title: Show score timestamp in Quick Read card
    status: done
    priority: low
    notes_for_next_agent: >
      The Quick Read supporting list (page.tsx) shows Data mode, Confidence,
      Active signals, Sources — but no indication of when the score was run.
      Fix: capture a scoredAt timestamp (new Date()) when setResult() is
      called in submitAddress(). Add it to supportingDetails as a new item:
      label "Scored at", value formatted as "h:mm a" (e.g. "2:34 PM").
      Use Intl.DateTimeFormat for formatting — no date library needed.

  - id: app-017
    title: Keyboard shortcut — slash key focuses address input
    status: done
    priority: low
    notes_for_next_agent: >
      Add a global keydown listener in page.tsx that focuses inputRef when
      the user presses "/" and no input/textarea/select is currently focused
      (check document.activeElement.tagName). Prevent the "/" character from
      being inserted into the input by calling event.preventDefault() before
      focusing. This is a standard pattern for search-first tools.

  - id: app-018
    title: Good-news empty state when no risks detected
    status: done
    priority: low
    notes_for_next_agent: >
      If the backend returns top_risks: [] the TopRiskGrid renders an empty
      grid with no message. This looks broken.
      Fix: in TopRiskGrid (score-experience.tsx), if riskCards.length === 0,
      render a small informational panel: "No active disruption signals
      detected near this address." with a note that the score reflects
      conditions at time of lookup.

  - id: app-019
    title: History dropdown closes on Escape key
    status: done
    priority: low
    notes_for_next_agent: >
      The history dropdown (showHistory) in page.tsx has no Escape key
      handler. Add one to the existing handleInputKeyDown or as a separate
      document-level listener scoped to when showHistory is true.
      Also close the dropdown when the user clicks outside the
      .history-dropdown-shell (extend the existing handleClickOutside
      useEffect or add a separate ref for the shell).

  - id: app-020
    title: Confidence dot color fix — LOW confidence should not look green/safe
    status: done
    priority: low
    notes_for_next_agent: >
      In globals.css, .confidence-dot--low is #3ce5b3 (mint green) and
      .confidence-dot--high is #ff7070 (red). These colors suggest low
      confidence is "safe" and high confidence is "dangerous", which is the
      wrong semantic — confidence is about certainty, not risk level.
      Fix: change .confidence-dot--low to rgba(255,255,255,0.35) (neutral
      grey-white) and .confidence-dot--medium to var(--warning) (#ffd497).
      Leave .confidence-dot--high as the brand blue (#8da5ff) — high
      confidence is a good, strong signal. Update any legend/tooltip copy
      that refers to these colors.

  - id: app-021
    title: Add aria-live region around score result section
    status: done
    priority: low
    notes_for_next_agent: >
      When a new score loads, screen reader users get no announcement.
      The loading state has aria-live="polite" on .loading-step-list but
      the results section has no equivalent.
      Fix: wrap the <section className="results results--loaded ..."> in a
      <div aria-live="polite" aria-atomic="false">. Also ensure the score
      number element has a meaningful aria-label like
      aria-label="Disruption score: 62 out of 100".

  - id: app-022
    title: Mobile topnav cleanup in workspace mode
    status: done
    priority: low
    notes_for_next_agent: >
      On screens ≤640px in workspace mode, the topnav shows: brand lockup +
      (Viewing + address + Recent + Score + Signals + Examples + Pricing).
      This overflows and wraps badly.
      Fix: at ≤640px in workspace mode, hide the Score/Signals/Examples
      anchor links from the topnav (they still exist in the page for larger
      screens). Keep Pricing and Recent. Use a CSS class toggled by
      workspaceMode or a media-query modifier on .topnav in globals.css.

  - id: app-023
    title: Add skip-to-main-content link for keyboard accessibility
    status: done
    priority: low
    notes_for_next_agent: >
      There is no skip nav link, so keyboard users must tab through the
      entire header before reaching the address input.
      Fix: add a visually-hidden <a href="#address"> as the first child of
      <body> (in layout.tsx or page.tsx). Style it to appear only on focus
      using a .skip-link CSS class in globals.css. This is a WCAG 2.1 AA
      requirement.

