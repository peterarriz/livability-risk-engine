version: 1
settings:
  actionable_statuses:
    - ready
    - in_progress
  dependency_ready_statuses:
    - ready
    - in_progress
    - done
  blocked_statuses:
    - blocked
lanes:
  product:
    display_name: Product
    ready_queue_target: 3
    current_focus:
      - product-030
    blockers: []
    update_when:
      - A product task changes status.
      - Product adds or removes acceptance criteria.
      - Product changes lane priorities or blocks another lane.
    notes: product-030 corrected scope on 2026-04-30. Product direction is multi-city/nationwide-capable with Chicago as reference/deepest-coverage market, not the boundary. data-086 added 50 context-ready expansion cities to the coverage registry; buyer-facing caveats must stay coverage-aware.
  data:
    display_name: Data
    ready_queue_target: 3
    current_focus:
      - data-086
    blockers: []
    update_when:
      - A data ingestion or normalization task changes status.
      - A dependency from Product or App blocks data delivery.
      - Data decides the next source or schema checkpoint.
    notes: Multi-city scope is now active. data-086 is done: city_coverage registry schema plus a 50-city context_ready seed were added from repo-backed generated/context-source evidence, with provenance, freshness, coordinate coverage, normalization fit, and caveats documented.
  app:
    display_name: App
    ready_queue_target: 3
    current_focus:
      - app-047
    blockers: []
    update_when:
      - An app task changes status.
      - App is waiting on Data output or Product contract decisions.
      - The demo flow needs a different next-ready task.
    notes: product-030 superseded the Chicago-only parts of app-046. Backend/frontend should preserve multi-city scope and avoid rejecting non-Chicago addresses solely due to location. app-047 is ready to expose the 50 data-086 coverage-registry cities in demo/API copy while preserving sparse-source caveats.
