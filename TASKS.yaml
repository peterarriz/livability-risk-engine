  - id: data-041
    title: Set up ingest monitoring and alerting
    status: done
    priority: high
    github_issue: 133
    notes_for_next_agent: >
      Completed 2026-03-23. Three changes landed:
      1. run_pipeline.py: writes to ingest_runs table on every non-dry-run.
