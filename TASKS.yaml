  - id: data-060
    title: Fix map display for utility_outage and utility_repair signal types
    status: done
    priority: high
    github_issue: 169
    notes_for_next_agent: >
      data-046 (PR #168) added utility_outage and utility_repair to the backend
      scoring model and to the ImpactType TS union in api.ts, but map-view.tsx
      was never updated. This caused water main breaks and gas leak 311 signals
      to render as gray unlabeled circles on the map.
      Fix: added utility_outage (#7C3AED deep violet, 170m radius) and
      utility_repair (#A78BFA light violet, 130m radius) to IMPACT_COLOR,
      HEAT_RADIUS, IMPACT_LABEL, and ALL_IMPACT_TYPES in map-view.tsx.
      Verified: 311 signals (potholes/cave-ins/trees), special events, and
      film permits all render correctly using existing impact types.
      CTA alerts also confirmed correct (map to standard types).
      Next: data-059 (tier-8 dry-run validation) or data-038 (CDOT signal outage ingest).

