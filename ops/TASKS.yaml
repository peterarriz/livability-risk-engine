version: 2
metadata:
  description: Lane-aware task board for the Chicago MVP.
  actionable_statuses:
    - ready
    - in_progress
  backlog_statuses:
    - backlog
    - blocked
    - done
tasks:
  - id: product-001
    lane: product
    type: definition
    title: Finalize MVP scope
    owner: product
    status: done
    priority: high
    files:
      - docs/01_mvp_scope.md
    dependencies: []
    acceptance_criteria:
      - Scope clearly defined.
      - In-scope and out-of-scope listed.
    notes_for_next_agent: Locked for MVP. Do not expand without discussion.
  - id: product-002
    lane: product
    type: contract
    title: Define score response contract
    owner: product
    status: done
    priority: high
    files:
      - docs/04_api_contracts.md
    dependencies:
      - product-001
    acceptance_criteria:
      - Schema finalized.
      - Severity buckets defined.
    notes_for_next_agent: Keep field names aligned with the API contract.
  - id: product-003
    lane: product
    type: design
    title: Define scoring weights v1
    owner: product
    status: done
    priority: high
    files:
      - docs/03_scoring_model.md
    dependencies:
      - product-002
    acceptance_criteria:
      - Weight per severity defined.
      - Distance decay defined.
      - Time weighting defined.
    notes_for_next_agent: Completed with a compact v1 rubric in docs/03_scoring_model.md covering base project weights, distance decay, timing multipliers, aggregation limits, and severity-alignment guardrails.
  - id: product-004
    lane: product
    type: qa
    title: Define 20 test addresses in Chicago
    owner: product
    status: done
    priority: medium
    files:
      - docs/03_scoring_model.md
    dependencies:
      - product-001
    acceptance_criteria:
      - Mix of high, medium, and low disruption areas.
      - Usable by Data and App for QA later.
    notes_for_next_agent: Completed with a plausible grouped QA/demo address set in docs/03_scoring_model.md.
  - id: product-005
    lane: product
    type: content
    title: Define explanation templates
    owner: product
    status: done
    priority: medium
    files:
      - docs/04_api_contracts.md
    dependencies:
      - product-002
    acceptance_criteria:
      - Explanation string format defined.
      - Supports top 3 drivers.
    notes_for_next_agent: Completed via deterministic explanation rules and demo-ready response copy.
  - id: data-001
    lane: data
    type: research
    title: Document Chicago data sources
    owner: data
    status: in_progress
    priority: high
    files:
      - docs/05_data_sources_chicago.md
    dependencies:
      - product-001
    acceptance_criteria:
      - Priority 1, 2, and 3 sources defined.
      - Access method and refresh cadence captured.
    notes_for_next_agent: Focus on sources usable within the MVP timeline.
  - id: data-002
    lane: data
    type: ingest
    title: Ingest building permits (raw)
    owner: data
    status: ready
    priority: high
    files:
      - backend/ingest/building_permits.py
      - db/schema.sql
    dependencies:
      - data-001
    acceptance_criteria:
      - Script pulls permits.
      - Raw records stored in a source table.
    notes_for_next_agent: Preserve original source identifiers for traceability.
  - id: data-003
    lane: data
    type: ingest
    title: Ingest demolition permits (raw)
    owner: data
    status: backlog
    priority: medium
    files:
      - backend/ingest/demolition.py
    dependencies:
      - data-001
    acceptance_criteria:
      - Raw ingestion working.
      - Shared raw schema reused where possible.
    notes_for_next_agent: Only pull fields needed for the canonical project model.
  - id: data-004
    lane: data
    type: ingest
    title: Ingest street closure permits
    owner: data
    status: ready
    priority: high
    files:
      - backend/ingest/street_closures.py
    dependencies:
      - data-001
    acceptance_criteria:
      - Closure records stored in a raw table.
      - Source timestamps preserved.
    notes_for_next_agent: Prioritize planned closures over speculative feeds.
  - id: data-005
    lane: data
    type: schema
    title: Create canonical projects table
    owner: data
    status: backlog
    priority: high
    files:
      - db/schema.sql
    dependencies:
      - product-002
    acceptance_criteria:
      - Schema matches the API contract.
      - Project IDs are stable across ingests.
    notes_for_next_agent: Do not redesign the normalized project schema without App review.
  - id: data-006
    lane: data
    type: normalize
    title: Normalize building permits to projects
    owner: data
    status: backlog
    priority: high
    files:
      - backend/models/project.py
    dependencies:
      - data-002
      - data-005
    acceptance_criteria:
      - Permits mapped to the canonical project schema.
      - Missing fields handled deterministically.
    notes_for_next_agent: Keep source-to-project mapping easy to audit.
  - id: data-007
    lane: data
    type: normalize
    title: Normalize street closures to projects
    owner: data
    status: backlog
    priority: high
    files:
      - backend/models/project.py
    dependencies:
      - data-004
      - data-005
    acceptance_criteria:
      - Closures mapped correctly.
      - Impact type and scale fields populated consistently.
    notes_for_next_agent: Reuse the same normalization conventions as permits.
  - id: data-008
    lane: data
    type: geospatial
    title: Add geocoding layer
    owner: data
    status: backlog
    priority: medium
    files:
      - backend/ingest/geocode.py
    dependencies:
      - data-002
    acceptance_criteria:
      - Addresses converted to lat/lng.
      - Failed geocodes can be retried.
    notes_for_next_agent: Geocoding can be daily batch work for MVP.
  - id: data-009
    lane: data
    type: query
    title: Implement radius query for nearby projects
    owner: data
    status: backlog
    priority: high
    files:
      - backend/scoring/query.py
    dependencies:
      - data-005
    acceptance_criteria:
      - Returns projects within radius.
      - Query shape is usable by the score endpoint.
    notes_for_next_agent: Favor simple distance filtering over premature optimization.
  - id: app-001
    lane: app
    type: scaffold
    title: Scaffold FastAPI backend
    owner: app
    status: done
    priority: high
    files:
      - backend/app/main.py
    dependencies:
      - product-002
    acceptance_criteria:
      - API runs locally.
      - Health endpoint exists.
    notes_for_next_agent: Completed with a minimal FastAPI app entrypoint in backend/app/main.py.
  - id: app-002
    lane: app
    type: endpoint
    title: Create mocked /score endpoint
    owner: app
    status: done
    priority: high
    files:
      - backend/app/main.py
    dependencies:
      - app-001
    acceptance_criteria:
      - Returns a static response matching the contract.
      - Supports the documented request fields.
    notes_for_next_agent: Completed with the tightened minimal contract in backend/app/main.py.
  - id: app-003
    lane: app
    type: scaffold
    title: Scaffold Next.js frontend
    owner: app
    status: done
    priority: high
    files:
      - frontend/
    dependencies:
      - product-002
    acceptance_criteria:
      - App runs locally.
      - Basic page shell exists.
    notes_for_next_agent: Completed with a minimal Next.js app-router scaffold in frontend/.
  - id: app-004
    lane: app
    type: feature
    title: Build address input and submit flow
    owner: app
    status: done
    priority: high
    files:
      - frontend/src/app/page.tsx
    dependencies:
      - app-003
    acceptance_criteria:
      - User can input an address.
      - Request is submitted to the score endpoint.
    notes_for_next_agent: Completed in frontend/src/app/page.tsx with a default Chicago address.
  - id: app-005
    lane: app
    type: feature
    title: Build score card component
    owner: app
    status: done
    priority: medium
    files:
      - frontend/src/app/page.tsx
    dependencies:
      - app-002
    acceptance_criteria:
      - Score renders.
      - Confidence or severity renders.
    notes_for_next_agent: Completed directly in the single-page demo to keep the UI minimal.
  - id: app-006
    lane: app
    type: feature
    title: Render top risks and explanation
    owner: app
    status: done
    priority: medium
    files:
      - frontend/src/app/page.tsx
    dependencies:
      - app-005
    acceptance_criteria:
      - Risks displayed cleanly.
      - Explanation text visible near the score.
    notes_for_next_agent: Completed directly in the single-page demo using ordered top_risks strings.
  - id: app-007
    lane: app
    type: feature
    title: Add map view (Mapbox or Leaflet)
    owner: app
    status: backlog
    priority: low
    files:
      - frontend/src/components/Map.tsx
    dependencies:
      - app-004
    acceptance_criteria:
      - Map renders.
      - Projects plotted.
    notes_for_next_agent: This is demo polish; defer if it slows core API work.
  - id: app-008
    lane: app
    type: integration
    title: Connect frontend to real backend
    owner: app
    status: blocked
    priority: high
    files:
      - frontend/src/lib/api.ts
    dependencies:
      - data-009
    acceptance_criteria:
      - Real score endpoint used.
      - Error states handled for empty responses.
    notes_for_next_agent: Blocked on data-009 (radius query for nearby projects); once Data exposes the query shape the frontend can swap from demo fallback to live score fetches without changing the API contract.
  - id: product-006
    lane: product
    type: definition
    title: Define confidence rubric for score responses
    owner: product
    status: done
    priority: medium
    files:
      - docs/04_api_contracts.md
    dependencies:
      - product-002
    acceptance_criteria:
      - HIGH, MEDIUM, and LOW confidence rules are documented.
      - Rubric can be applied without changing scoring logic.
    notes_for_next_agent: Completed with an MVP confidence ladder in docs/03_scoring_model.md and aligned API notes in docs/04_api_contracts.md.
  - id: app-009
    lane: app
    type: qa
    title: Add mocked score endpoint smoke-check task
    owner: app
    status: done
    priority: medium
    files:
      - docs/handoffs/app.md
      - README.md
    dependencies:
      - app-002
    acceptance_criteria:
      - Mocked backend check steps are documented.
      - The task is small enough to complete before real data wiring.
    notes_for_next_agent: Completed with mocked backend/frontend smoke-check steps in README.md and docs/handoffs/app.md so App can validate `/score` before real data integration.
  - id: app-010
    lane: app
    type: design
    title: Establish premium frontend shell for demo
    owner: app
    status: done
    priority: medium
    files:
      - frontend/src/app/page.tsx
      - frontend/src/app/globals.css
      - frontend/src/app/layout.tsx
      - frontend/src/components/shell.tsx
    dependencies:
      - app-003
      - app-004
    acceptance_criteria:
      - The demo has a premium visual foundation with a clear hero, input, and results layout.
      - Empty and loading states feel intentional and presentation-ready.
      - The work does not change the API contract or add advanced components.
    notes_for_next_agent: Completed with reusable shell components, upgraded visual styling, and refined empty/loading states for the high-stakes demo shell.
  - id: app-011
    lane: app
    type: feature
    title: Create high-impact score visualization experience
    owner: app
    status: done
    priority: high
    files:
      - frontend/src/app/page.tsx
      - frontend/src/app/globals.css
      - frontend/src/components/score-experience.tsx
    dependencies:
      - app-005
      - app-006
      - app-010
    acceptance_criteria:
      - The score section feels like the core product moment.
      - Severity is visualized clearly without changing the API contract.
      - Top risks and explanation feel presentation-ready with smooth loading-to-result transitions.
    notes_for_next_agent: Completed with a score hero, severity meters, derived top-risk cards built from existing top_risks strings, an insight-style explanation panel, and subtle motion.
  - id: app-012
    lane: app
    type: polish
    title: Refine investor-ready demo polish and flow
    owner: app
    status: done
    priority: high
    files:
      - frontend/src/app/page.tsx
      - frontend/src/app/globals.css
      - frontend/src/components/score-experience.tsx
    dependencies:
      - app-010
      - app-011
    acceptance_criteria:
      - Spacing, hierarchy, and hover behavior feel cohesive across the page.
      - Demo helper address chips improve presenter flow without changing scope.
      - The score experience feels polished on laptop and tablet layouts.
    notes_for_next_agent: Completed with tighter spacing, richer atmosphere, hover polish, example address chips, clearer intelligence labels, and more responsive layout behavior.
  - id: app-013
    lane: app
    type: layout
    title: Create workspace-style results mode
    owner: app
    status: done
    priority: high
    files:
      - frontend/src/app/page.tsx
      - frontend/src/app/globals.css
    dependencies:
      - app-010
      - app-011
      - app-012
    acceptance_criteria:
      - Pre-search and post-search modes feel materially different.
      - Results mode uses a structured multi-column workspace layout with a map placeholder.
      - Transition from hero mode to results mode feels smoother than a simple content swap.
    notes_for_next_agent: Completed with a persistent compact search bar, workspace grid, sticky sidebar, map placeholder, and stronger state transitions between exploration and analysis modes.
  - id: app-014
    lane: app
    type: polish
    title: Make single-page navigation and demo fallback production-ready
    owner: app
    status: done
    priority: high
    files:
      - frontend/src/app/page.tsx
      - frontend/src/app/globals.css
      - frontend/src/lib/api.ts
    dependencies:
      - app-008
      - app-013
    acceptance_criteria:
      - Top navigation maps to real in-page Score, Signals, and Demo sections.
      - Demo data fallback preserves a polished experience when live backend access is unavailable.
      - The single-page app feels broader and more complete without adding routes.
    notes_for_next_agent: Completed with anchored in-page navigation, explicit Score/Signals/Demo sections, and a graceful demo-data fallback that avoids a dead-end configuration error.
  - id: product-010
    lane: product
    type: qa
    title: Review explanation copy against the 18 QA addresses
    owner: product
    status: ready
    priority: high
    files:
      - docs/03_scoring_model.md
      - docs/04_api_contracts.md
    dependencies:
      - product-003
      - product-004
      - product-005
    acceptance_criteria:
      - All 18 addresses have a plausible expected disruption tier.
      - Explanation copy reads naturally for high, medium, and low cases.
    notes_for_next_agent: Focus on demo plausibility, not model perfection.
  - id: product-011
    lane: product
    type: definition
    title: Freeze severity label rules for noise traffic and dust
    owner: product
    status: done
    priority: medium
    files:
      - docs/03_scoring_model.md
      - docs/04_api_contracts.md
    dependencies:
      - product-003
      - product-005
    acceptance_criteria:
      - LOW, MEDIUM, and HIGH usage is documented for each severity category.
      - App and backend can render severity without extra interpretation.
    notes_for_next_agent: Completed with explicit LOW/MEDIUM/HIGH severity meanings and clarified category mapping in docs/03_scoring_model.md and docs/04_api_contracts.md.
  - id: product-012
    lane: product
    type: qa
    title: Approve final mocked score example for demo reviewers
    owner: product
    status: backlog
    priority: medium
    files:
      - docs/04_api_contracts.md
      - docs/handoffs/product.md
    dependencies:
      - product-010
      - product-011
    acceptance_criteria:
      - One final example response is approved for demo walkthroughs.
      - Example wording matches backend and frontend behavior.
    notes_for_next_agent: Use the Chicago Ave example unless a better demo case emerges.
  - id: product-013
    lane: product
    type: calibration
    title: Define v1 heuristic score thresholds and dominance rules
    owner: product
    status: done
    priority: high
    files:
      - docs/03_scoring_model.md
      - docs/04_api_contracts.md
    dependencies:
      - product-003
      - product-011
    acceptance_criteria:
      - The scoring model documents what combinations of distance, scale, and timing should typically land in each score band.
      - Dominant-signal rules are explicit enough for Data and App to explain results consistently.
    notes_for_next_agent: Completed with score-band threshold guidance, weighted-contribution examples, dominant-signal rules, and deterministic tie-breakers in docs/03_scoring_model.md plus matching API interpretation notes in docs/04_api_contracts.md.
  - id: product-014
    lane: product
    type: qa
    title: Review 18 QA addresses against the product trust checklist
    owner: product
    status: ready
    priority: high
    files:
      - docs/03_scoring_model.md
      - docs/product_qa_checklist.md
    dependencies:
      - product-010
      - product-011
    acceptance_criteria:
      - Each QA address has a plausible score band expectation.
      - Any explanation-tone or confidence mismatches are documented for follow-up.
    notes_for_next_agent: Focus on trust and plausibility, not perfect ground truth.
  - id: product-015
    lane: product
    type: terminology
    title: Decide buyer-facing wording for traffic versus curb access impacts
    owner: product
    status: done
    priority: medium
    files:
      - docs/03_scoring_model.md
      - docs/04_api_contracts.md
    dependencies:
      - product-011
    acceptance_criteria:
