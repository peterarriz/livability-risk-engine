  - id: data-041b
    title: Set up ingest monitoring and alerting
    status: done
    priority: high
    github_issue: 133
    notes_for_next_agent: >
      Three improvements implemented (issue #133):
        1. /health/db now queries ingest_runs for last_ingest_at and
           last_ingest_status (replaces null placeholder). Also fixed a
           column-name bug in _get_last_ingest_time(): was querying
           completed_at (doesn't exist) — corrected to finished_at.
        2. backend/ingest/row_count_check.py — standalone script that
           compares current active project count vs. prior successful
           ingest_runs.record_count. Exits 1 if drop > 20% threshold.
