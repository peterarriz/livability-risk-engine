      IMPORTANT: REQUIRE_API_KEY is still disabled on Railway by default.
      Metering only accumulates when REQUIRE_API_KEY=true is set. For billing,
      enable it when the first paying customer onboards.
      Next: data-042 — validate scoring weights against real addresses.

  - id: data-044
    title: Post-ingest data quality validation step
    status: done
    priority: high
    github_issue: ~
    notes_for_next_agent: >
      Completed 2026-03-23. Two changes landed:
      1. scripts/validate_ingest.py — standalone script with four checks:
           CHECK 1: Missing coords (>5% active records → hard fail)
           CHECK 2: Stale active records with end_date >30 days past (>10% → hard fail)
           CHECK 3: Duplicate (source, source_id) pairs (any → hard fail)
           CHECK 4: Unknown impact_type values not in BASE_WEIGHTS (any → hard fail)
         Exits 0 if all pass, exits 1 on any hard failure.
         Can be run manually: DATABASE_URL="..." python scripts/validate_ingest.py
      2. .github/workflows/ingest.yml — "Data quality validation" step added
         after the smoke check, before the failure notifier.
         Skipped on dry_run=true (same as smoke check).
      Thresholds are constants at the top of validate_ingest.py — easy to adjust.
      Next: data-042 — validate and calibrate scoring weights against real addresses.

  - id: data-045
    title: Batch scoring endpoint — score multiple addresses in one request
    status: backlog
    priority: medium
    github_issue: ~
    notes_for_next_agent: >
      Enterprise buyers (relocation firms, corporate real estate portfolios)
      need to score 50–200 addresses at once, not one at a time via /score.
      Add a POST /score/batch endpoint to backend/app/main.py:
        - Request body: {"addresses": ["addr1", "addr2", ...]} (max 200)
        - Response: {"results": [{address, disruption_score, confidence,
          severity, top_risks, explanation, error?}, ...], "scored": N,
          "failed": N}
        - Geocode in parallel (asyncio.gather or ThreadPoolExecutor)
        - Cap at 200 addresses per request; return 422 if over limit
        - API key auth required (always — do not allow unauthenticated batch)
        - Log batch size to score_history with a batch_id field
