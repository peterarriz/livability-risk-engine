    type: ingest
    title: Ingest building permits (raw)
    owner: data
    status: done
    priority: high
    files:
      - backend/ingest/building_permits.py
      - db/schema.sql
    dependencies:
      - data-001
    acceptance_criteria:
      - Script pulls permits.
      - Raw records stored in a source table.
    notes_for_next_agent: Completed. backend/ingest/building_permits.py pulls from Socrata (dataset ydr8-5enu) with incremental --days flag support and upserts into raw_building_permits using source_id as the stable key. db/schema.sql defines raw_building_permits and raw_street_closures with PostGIS geometry and indexing. Run with DATABASE_URL env var pointing at a PostGIS-enabled Postgres instance. Next step is data-006 (normalize permits to canonical projects) once data-005 (canonical projects table) is done.
  - id: data-003
    lane: data
    type: ingest
    title: Ingest demolition permits (raw)
    owner: data
    status: done
    priority: medium
    files:
      - backend/ingest/demolition.py
    dependencies:
      - data-001
    acceptance_criteria:
      - Raw ingestion working.
      - Shared raw schema reused where possible.
    notes_for_next_agent: Only pull fields needed for the canonical project model.
  - id: data-004
    lane: data
    type: ingest
    title: Ingest street closure permits
    owner: data
    status: done
    priority: high
    files:
      - backend/ingest/street_closures.py
    dependencies:
      - data-001
    acceptance_criteria:
      - Closure records stored in a raw table.
      - Source timestamps preserved.
    notes_for_next_agent: Completed. backend/ingest/street_closures.py pulls from Socrata (dataset Ansr-8mav) filtered to recent/future close_date with incremental --days flag support. Upserts into raw_street_closures (defined in db/schema.sql) using source_id as the stable key. Source timestamps (source_updated_at, close_date, reopen_date) are preserved. Default full pull covers last 180 days forward to focus on planned closures. Next step is data-007 (normalize closures to canonical projects) once data-005 is done.
