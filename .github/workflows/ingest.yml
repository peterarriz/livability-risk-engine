name: Daily ingest pipeline

# task: data-018
# lane: data
#
# Runs the full Chicago data ingest pipeline on a daily schedule.
# Fetches building permits + street closures from Socrata, geocodes
# missing coordinates, and upserts normalized records into the live
# Railway Postgres+PostGIS database.
#
# Required GitHub secrets:
#   DATABASE_URL              — Railway Postgres connection string
#                               (Settings → Secrets → DATABASE_URL)
#
# Optional GitHub secrets:
#   CHICAGO_SOCRATA_APP_TOKEN — Socrata app token for higher rate limits
#                               Without it the pipeline still works but
#                               may be throttled on large pulls.
#
# Manual trigger:
#   GitHub → Actions → "Daily ingest pipeline" → Run workflow
#   Use dry_run=true to fetch data without writing to the DB.

on:
  schedule:
    # 06:00 UTC daily — after Chicago midnight, before business hours open.
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch data but do not write to DB"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_geocode:
        description: "Skip geocode fill step (faster if coordinates already present)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  ingest:
    name: Run ingest pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply schema (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Install psql client
          sudo apt-get install -y postgresql-client --quiet
          bash scripts/apply_schema.sh

      - name: Run ingest pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CHICAGO_SOCRATA_APP_TOKEN: ${{ secrets.CHICAGO_SOCRATA_APP_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.skip_geocode }}" = "true" ]; then
            ARGS="$ARGS --skip-geocode"
          fi
          python run_pipeline.py $ARGS

      - name: Verify live scoring (smoke check)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Quick row-count check to confirm data landed
          python -c "
          import os, psycopg2
          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = conn.cursor()
          cur.execute('SELECT COUNT(*) FROM projects WHERE status = %s', ('active',))
          count = cur.fetchone()[0]
          conn.close()
          print(f'Active projects in DB: {count}')
          if count == 0:
              raise SystemExit('ERROR: No active projects found after ingest')
          "

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Ingest pipeline failed. Check the logs above."
          echo "::notice::Run manually: python run_pipeline.py --dry-run to diagnose."
